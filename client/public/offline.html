<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — Nutriser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #FFFFFF; font-family: 'Lato', sans-serif; }
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      text-align: center;
    }
    img { width: 80px; height: 80px; object-fit: contain; }
    h1 { color: #C5A55A; font-size: 18px; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 300; }
    p { color: rgba(0,0,0,0.5); font-size: 14px; max-width: 280px; line-height: 1.6; }
    button {
      margin-top: 8px;
      background: #C5A55A;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/icons/icon-192x192.png" alt="Nutriser" />
    <h1>Sin conexión</h1>
    <p>Parece que no tienes conexión a internet. Revisa tu red e intenta de nuevo.</p>
    <button onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
