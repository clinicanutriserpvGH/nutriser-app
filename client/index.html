    <!-- ═══════════════════════════════════════════════════════════
         PANTALLA DE CARGA NATIVA — aparece ANTES de que React cargue
         Fondo negro + logo Nutriser + spinner dorado en CSS puro
         ═══════════════════════════════════════════════════════════ -->
    <style>
      /* Fondo blanco inmediato en todo el documento */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #FFFFFF;
        height: 100%;
      }

      /* Pantalla de carga */
      #nutriser-loading {
        position: fixed;
        inset: 0;
        z-index: 999999;
        background-color: #FFFFFF;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        transition: opacity 0.4s ease;
      }

      #nutriser-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      /* Contenedor del logo + spinner */
      .nutriser-loader-ring {
        position: relative;
        width: 112px;
        height: 112px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Anillo estático de fondo */
      .nutriser-loader-ring::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1px solid rgba(197, 165, 90, 0.3);
      }

      /* Spinner giratorio */
      .nutriser-loader-ring::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: #C5A55A;
        animation: nutriser-spin 1s linear infinite;
      }

      @keyframes nutriser-spin {
        to { transform: rotate(360deg); }
      }

      /* Logo centrado */
      .nutriser-loader-logo {
        width: 80px;
        height: 80px;
        object-fit: contain;
        position: relative;
        z-index: 1;
      }

      /* Textos */
      .nutriser-loader-text {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .nutriser-loader-title {
        color: #C5A55A;
        font-size: 11px;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        font-family: 'Lato', sans-serif;
        font-weight: 300;
        animation: nutriser-pulse 1.5s ease-in-out infinite;
      }

      .nutriser-loader-subtitle {
        color: rgba(0, 0, 0, 0.4);
        font-size: 9px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        font-family: 'Lato', sans-serif;
        font-weight: 300;
      }

      @keyframes nutriser-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      /* Root oculto hasta que React esté listo */
      #root {
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      #root.ready {
        opacity: 1;
      }
    </style>
  </head>

    <!-- Pantalla de carga nativa: visible desde el primer byte, sin esperar JS -->
    <div id="nutriser-loading">

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Ocultar la pantalla de carga nativa cuando React esté montado -->
    <script>
      // Se ejecuta cuando React llama a ReactDOM.createRoot().render()
      // Usamos MutationObserver para detectar cuando #root tiene contenido
      var loadingEl = document.getElementById('nutriser-loading');
      var rootEl = document.getElementById('root');
      var observer = new MutationObserver(function() {
        if (rootEl && rootEl.children.length > 0) {
          observer.disconnect();
          // Mostrar el contenido de React
          rootEl.classList.add('ready');
          // Desvanecer la pantalla de carga
          if (loadingEl) {
            loadingEl.classList.add('fade-out');
            setTimeout(function() {
              if (loadingEl && loadingEl.parentNode) {
                loadingEl.parentNode.removeChild(loadingEl);
              }
            }, 450);
          }
        }
      });
      if (rootEl) {
        observer.observe(rootEl, { childList: true, subtree: false });
      }
    </script>

    <!-- Register Service Worker for PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {

            .then(function(registration) {
              console.log('[PWA] Service Worker registered:', registration.scope);
              // Force update check on every page load to push new SW versions
              registration.update().catch(function() {});
            })
            .catch(function(err) {
              console.log('[PWA] Service Worker registration failed:', err);
            });
        });
      }
    </script>
